; PlatformIO config for Elecrow CrowPanel 5.0" ESP32-S3 Task Viewer
; ============================================================
; Based on working Elecrow example project

[platformio]
src_dir = src
boards_dir = .

[env:esp32-s3-devkitc-1-myboard]
platform = espressif32
board = esp32-s3-devkitc-1-myboard
framework = arduino

; Pin arduino-esp32 to 2.0.3 — newer versions can boot-loop with RGB panels
platform_packages = framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32#2.0.3

; Force memory mode explicitly for CrowPanel board variant
board_build.arduino.memory_type = qspi_opi

build_flags =
    -D LV_LVGL_H_INCLUDE_SIMPLE
    -Isrc

lib_deps =
    lvgl/lvgl@8.3.6
    tamctec/TAMC_GT911@^1.0.2
    lovyan03/LovyanGFX@^1.1.12
    bblanchon/ArduinoJson@^6.21.5
    arduino-libraries/NTPClient@^3.2.1

board_build.partitions = huge_app.csv

; Upload/monitor settings
;upload_port = /dev/ttyUSB0
;monitor_port = /dev/ttyUSB0
monitor_speed = 115200
upload_speed = 460800
monitor_filters = esp32_exception_decoder
monitor_rts = 0
monitor_dtr = 0

